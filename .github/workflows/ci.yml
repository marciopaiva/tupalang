name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "docs/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title-convention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Validate PR title convention (warning only)
        run: |
          title="${{ github.event.pull_request.title }}"
          pattern='^(feat|fix|docs|refactor|test|ci|chore)(\([a-z0-9._-]+\))?: .+'
          if echo "$title" | grep -Eq "$pattern"; then
            echo "PR title convention: ok"
          else
            echo "::warning title=PR title convention::Use Conventional Commits style in PR title: <type>(<scope>): <summary>"
            echo "Current title: $title"
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all --check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        env:
          TUPA_RUN_E2E: "0"
        run: cargo test --workspace --locked

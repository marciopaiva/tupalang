name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "docs/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title-convention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title convention
        run: |
          title="${{ github.event.pull_request.title }}"
          pattern='^(feat|fix|docs|refactor|test|ci|chore)(\([a-z0-9._/-]+\))?: .+'
          if echo "$title" | grep -Eq "$pattern"; then
            echo "PR title convention: ok"
          else
            echo "PR title does not follow Conventional Commits style"
            echo "Expected: <type>(<scope>): <summary>"
            echo "Current:  $title"
            exit 1
          fi

  commit-message-convention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages in PR
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          range="origin/${{ github.base_ref }}..HEAD"
          pattern='^(feat|fix|docs|refactor|test|ci|chore)(\([a-z0-9._/-]+\))?: .+'
          bad=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -Eq "$pattern"; then
              echo "Invalid commit message: $msg"
              bad=1
            fi
          done < <(git log --pretty=%s "$range")

          if [ "$bad" -ne 0 ]; then
            echo "One or more commit messages do not follow Conventional Commits"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all --check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        env:
          TUPA_RUN_E2E: "0"
        run: cargo test --workspace --locked

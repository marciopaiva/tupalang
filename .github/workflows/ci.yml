name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - ".markdownlint.json"
      - ".markdownlintignore"
      - "docs/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title-convention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title convention
        run: |
          title="${{ github.event.pull_request.title }}"
          pattern='^(feat|fix|docs|refactor|test|ci|chore)(\([a-z0-9._/-]+\))?: .+'
          if echo "$title" | grep -Eq "$pattern"; then
            echo "PR title convention: ok"
          else
            echo "PR title does not follow Conventional Commits style"
            echo "Expected: <type>(<scope>): <summary>"
            echo "Current:  $title"
            exit 1
          fi

  commit-message-convention:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate commit messages in PR
        uses: actions/github-script@v7
        with:
          script: |
            const pattern = /^(feat|fix|docs|refactor|test|ci|chore)(\([a-z0-9._/-]+\))?: .+/;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const invalid = commits
              .map(c => c.commit.message.split("\n")[0])
              .filter(msg => !pattern.test(msg));

            if (invalid.length) {
              core.setFailed(
                `Invalid commit message(s):\n- ${invalid.join("\n- ")}`
              );
            } else {
              core.info("All commit messages follow Conventional Commits.");
            }

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustfmt check
        run: cargo fmt --all --check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test workspace
        env:
          TUPA_RUN_E2E: "0"
        run: cargo test --workspace --locked

  vipertrade-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run ViperTrade-like smoke
        run: ./scripts/vipertrade-smoke.sh

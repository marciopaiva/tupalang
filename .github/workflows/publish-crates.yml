name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      publish_cli:
        description: "Also publish tupa-audit, tupa-fmt, tupa-lint and tupa-cli"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run cargo publish --dry-run"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-core:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish core crates in dependency order
        shell: bash
        run: |
          set -euo pipefail
          MODE="--locked"
          if [[ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]]; then
            MODE="--locked --dry-run"
          fi

          for crate in \
            tupa-lexer \
            tupa-effects \
            tupa-parser \
            tupa-typecheck \
            tupa-codegen \
            tupa-pyffi \
            tupa-runtime; do
            echo "Publishing $crate ($MODE)"
            cargo publish -p "$crate" $MODE
            if [[ "$MODE" != *"--dry-run"* ]]; then
              sleep 30
            fi
          done

  publish-cli:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_cli == 'true'
    runs-on: ubuntu-latest
    needs: publish-core
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish CLI dependency crates then tupa-cli
        shell: bash
        run: |
          set -euo pipefail
          MODE="--locked"
          if [[ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]]; then
            MODE="--locked --dry-run"
          fi

          for crate in tupa-audit tupa-fmt tupa-lint tupa-cli; do
            echo "Publishing $crate ($MODE)"
            cargo publish -p "$crate" $MODE
            if [[ "$MODE" != *"--dry-run"* ]]; then
              sleep 30
            fi
          done
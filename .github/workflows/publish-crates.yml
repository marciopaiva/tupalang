name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      publish_cli:
        description: "Also publish tupa-audit, tupa-fmt, tupa-lint and tupa-cli"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Run cargo publish --dry-run"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-core:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish core crates in dependency order
        shell: bash
        run: |
          set -euo pipefail
          MODE="--locked"
          if [[ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]]; then
            MODE="--locked --dry-run"
          fi

          publish_crate() {
            local crate="$1"
            echo "Publishing $crate ($MODE)"

            set +e
            OUTPUT=$(cargo publish -p "$crate" $MODE 2>&1)
            CODE=$?
            set -e

            echo "$OUTPUT"

            if [[ $CODE -eq 0 ]]; then
              if [[ "$MODE" != *"--dry-run"* ]]; then
                sleep 30
              fi
              return 0
            fi

            if [[ "$OUTPUT" == *"already exists on crates.io index"* ]]; then
              echo "Skipping $crate: already published"
              return 0
            fi

            return $CODE
          }

          for crate in \
            tupa-lexer \
            tupa-effects \
            tupa-parser \
            tupa-typecheck \
            tupa-codegen \
            tupa-pyffi \
            tupa-runtime; do
            publish_crate "$crate"
          done

  publish-cli:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_cli == 'true'
    runs-on: ubuntu-latest
    needs: publish-core
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish CLI dependency crates then tupa-cli
        shell: bash
        run: |
          set -euo pipefail
          MODE="--locked"
          if [[ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]]; then
            MODE="--locked --dry-run"
          fi

          publish_crate() {
            local crate="$1"
            echo "Publishing $crate ($MODE)"

            set +e
            OUTPUT=$(cargo publish -p "$crate" $MODE 2>&1)
            CODE=$?
            set -e

            echo "$OUTPUT"

            if [[ $CODE -eq 0 ]]; then
              if [[ "$MODE" != *"--dry-run"* ]]; then
                sleep 30
              fi
              return 0
            fi

            if [[ "$OUTPUT" == *"already exists on crates.io index"* ]]; then
              echo "Skipping $crate: already published"
              return 0
            fi

            return $CODE
          }

          for crate in tupa-audit tupa-fmt tupa-lint tupa-cli; do
            publish_crate "$crate"
          done

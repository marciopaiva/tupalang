name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tupa-linux-x86_64
            binary_path: target/release/tupa
          - os: macos-latest
            artifact_name: tupa-macos-aarch64
            binary_path: target/release/tupa
          - os: windows-latest
            artifact_name: tupa-windows-x86_64.exe
            binary_path: target/release/tupa.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tupa-cli

      - name: Prepare artifact
        shell: bash
        run: |
          cp "${{ matrix.binary_path }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum tupa-linux-x86_64 tupa-macos-aarch64 tupa-windows-x86_64.exe > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tupa-linux-x86_64
            dist/tupa-macos-aarch64
            dist/tupa-windows-x86_64.exe
            dist/checksums.txt
